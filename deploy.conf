# =============================================================================
# Calcifer Deploy Configuration
# =============================================================================
# This file is sourced by the deploy script
# Customize these values for your environment
# =============================================================================

# ==================== ENVIRONMENT ====================
# Environment name: dev, staging, production
DEPLOY_ENV="production"

# Default target: home or cloud
DEPLOY_TARGET="${DEPLOY_TARGET:-home}"

# ==================== HOME TARGET (LAN) ====================
HOME_HOST="192.168.8.180"
HOME_USER="dmgiangi"
HOME_SSH_KEY="${HOME}/.ssh/github_id"
HOME_DEPLOY_DIR="/opt/calcifer"
HOME_SERVICES="core-server grafana prometheus rabbitmq redis mongodb loki tempo"

# ==================== CLOUD TARGET ====================
CLOUD_HOST="dmgiangi.dev"
CLOUD_USER="dmgiangi"
CLOUD_SSH_KEY="${HOME}/.ssh/github_id"
CLOUD_DEPLOY_DIR="/opt/calcifer"
CLOUD_SERVICES="grafana prometheus loki tempo keycloak traefik"

# ==================== DOCKER REGISTRY ====================
DOCKER_REGISTRY="ghcr.io"
DOCKER_IMAGE_PREFIX="calcifer"

# ==================== TIMEOUTS ====================
HEALTH_CHECK_TIMEOUT=30
SSH_TIMEOUT=10

# ==================== ANSIBLE ====================
ANSIBLE_INVENTORY="infrastructure/ansible/inventory/hosts.yml"
ANSIBLE_PLAYBOOK="infrastructure/ansible/playbooks/deploy.yml"

