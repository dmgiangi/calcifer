name: Deploy Portfolio

on:
  repository_dispatch:
    types: [image-published]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.client_payload.image == 'ghcr.io/dmgiangi/portfolio'
    steps:
      - name: Log payload
        run: |
          echo "Image: ${{ github.event.client_payload.image }}"
          echo "Tag:   ${{ github.event.client_payload.tag }}"
          echo "SHA:   ${{ github.event.client_payload.sha }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Update portfolio image tag
        run: |
          sed -i "s|ghcr.io/dmgiangi/portfolio:[a-zA-Z0-9._-]*|ghcr.io/dmgiangi/portfolio:${{ github.event.client_payload.tag }}|g" \
            infrastructure/cloud/docker-compose.yaml
          echo "=== Updated line ==="
          grep "ghcr.io/dmgiangi/portfolio" infrastructure/cloud/docker-compose.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infrastructure/cloud/docker-compose.yaml
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "deploy: portfolio ${{ github.event.client_payload.tag }}"
          git push

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H dmgiangi.dev >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/id_ed25519 dmgiangi@dmgiangi.dev '
            cd /opt/calcifer && git pull
            cd infrastructure/cloud
            docker compose pull portfolio
            docker compose up -d portfolio
          '

      - name: Verify deployment
        run: |
          sleep 15
          ssh -i ~/.ssh/id_ed25519 dmgiangi@dmgiangi.dev '
            status=$(docker inspect calcifer_cloud_portfolio --format "{{.State.Health.Status}}" 2>/dev/null || echo "unknown")
            echo "Portfolio status: $status"
            [ "$status" = "healthy" ] && echo "✅ Deploy successful" || echo "::warning::Container not healthy yet: $status"
          '

