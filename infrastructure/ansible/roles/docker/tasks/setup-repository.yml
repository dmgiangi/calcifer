---
# Setup Docker official apt repository
# Following official Docker documentation: https://docs.docker.com/engine/install/ubuntu/

- name: Install required packages for Docker repository
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Create keyrings directory for apt
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker official GPG key
  ansible.builtin.get_url:
    url: "{{ docker_apt_gpg_key_url }}"
    dest: "{{ docker_apt_gpg_key_path }}"
    mode: '0644'
    force: false
  register: docker_gpg_key_download

- name: Get Ubuntu version codename
  ansible.builtin.shell: |
    set -o pipefail
    . /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}"
  args:
    executable: /bin/bash
  register: ubuntu_codename_result
  changed_when: false

- name: Set Ubuntu codename fact
  ansible.builtin.set_fact:
    ubuntu_codename: "{{ ubuntu_codename_result.stdout | trim }}"

- name: Get system architecture
  ansible.builtin.command: dpkg --print-architecture
  register: system_architecture_result
  changed_when: false

- name: Set system architecture fact
  ansible.builtin.set_fact:
    system_architecture: "{{ system_architecture_result.stdout | trim }}"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ system_architecture }} signed-by={{ docker_apt_gpg_key_path }}] {{ docker_apt_repository_url }} {{ ubuntu_codename }} stable"
    state: present
    filename: docker
    update_cache: true

