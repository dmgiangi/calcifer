---
# Configure user to run Docker without sudo
# Adds the specified user to the 'docker' group

- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ docker_user }}"
    groups: docker
    append: true
  register: docker_user_added

- name: Store user group change status for post-task notification
  ansible.builtin.set_fact:
    docker_user_group_changed: "{{ docker_user_added.changed }}"

