---
# Default variables for Docker role
# These can be overridden in inventory/group_vars/all.yml or playbook vars

# Docker packages to install (official Docker repository)
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

# Conflicting packages to remove before installation
docker_conflicting_packages:
  - docker.io
  - docker-compose
  - docker-compose-v2
  - docker-doc
  - podman-docker
  - containerd
  - runc

# Docker repository configuration
docker_apt_gpg_key_url: https://download.docker.com/linux/ubuntu/gpg
docker_apt_gpg_key_path: /etc/apt/keyrings/docker.asc
docker_apt_repository_url: https://download.docker.com/linux/ubuntu

# Docker service configuration
docker_service_enabled: true
docker_service_state: started

