---
# Reusable task: Validate snapshot_name parameter
# Ensures the snapshot name is provided and follows naming conventions
#
# Required variable: snapshot_name
#
# Usage: ansible.builtin.include_role:
#          name: timeshift
#          tasks_from: validate-snapshot-name

- name: Validate snapshot_name is provided
  ansible.builtin.fail:
    msg: |
      ERROR: Snapshot name is required!
      
      Usage examples:
        ansible-playbook playbooks/snapshot-create.yml -e "snapshot_name='pre-docker-install'" --ask-become-pass
        ansible-playbook playbooks/snapshot-restore.yml -e "snapshot_name='baseline'" --ask-become-pass
  when: snapshot_name is not defined or snapshot_name | trim == ''

- name: Validate snapshot_name format (alphanumeric, hyphens, underscores only)
  ansible.builtin.fail:
    msg: |
      ERROR: Invalid snapshot name '{{ snapshot_name }}'
      
      Snapshot name must:
        - Contain only alphanumeric characters, hyphens (-), and underscores (_)
        - Not contain spaces or special characters
      
      Valid examples: 'pre-docker-install', 'baseline_v1', 'milestone2'
  when: snapshot_name is not regex('^[a-zA-Z0-9_-]+$')

- name: Set validated snapshot name fact
  ansible.builtin.set_fact:
    validated_snapshot_name: "{{ snapshot_name | trim }}"

