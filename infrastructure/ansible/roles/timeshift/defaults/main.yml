---
# Timeshift role defaults
# These are fallback values - prefer setting variables in group_vars/all.yml
#
# Note: Most variables are defined in inventory/group_vars/all.yml
# to ensure consistency across all playbooks. This file contains
# only role-specific defaults that may need to be overridden per-host.

# Timeshift configuration directory
timeshift_config_dir: /etc/timeshift

# Timeshift configuration file
timeshift_config_file: "{{ timeshift_config_dir }}/timeshift.json"

