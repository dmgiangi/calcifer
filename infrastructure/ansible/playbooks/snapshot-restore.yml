---
# Restore a Timeshift snapshot by mnemonic name
#
# This playbook restores the system to a previous snapshot state.
# It includes safety checks and requires explicit confirmation before proceeding.
#
# IMPORTANT: A system reboot is required after restore to complete the process.
# The playbook will NOT reboot automatically - manual confirmation is required.
#
# Usage: ansible-playbook playbooks/snapshot-restore.yml -e "snapshot_name='pre-docker-install'" --ask-become-pass

- name: Restore Timeshift snapshot
  hosts: all
  become: true

  pre_tasks:
    - name: Validate snapshot name parameter
      ansible.builtin.include_role:
        name: timeshift
        tasks_from: validate-snapshot-name

    - name: Verify Timeshift is installed
      ansible.builtin.include_role:
        name: timeshift
        tasks_from: check-installed

    - name: Find snapshot by mnemonic name
      ansible.builtin.include_role:
        name: timeshift
        tasks_from: find-snapshot-by-name

  tasks:
    - name: Get snapshot details for confirmation
      ansible.builtin.slurp:
        src: "{{ timeshift_snapshots_data_path }}/{{ found_snapshot_timestamp }}/info.json"
      register: snapshot_info_raw

    - name: Parse snapshot info
      ansible.builtin.set_fact:
        snapshot_info: "{{ snapshot_info_raw.content | b64decode | from_json }}"

    - name: Display snapshot details
      ansible.builtin.debug:
        msg: |
          Snapshot to restore:
            Name: {{ validated_snapshot_name }}
            Timestamp: {{ found_snapshot_timestamp }}
            Created: {{ snapshot_info.created | default('unknown') }}

    - name: Request confirmation - type YES to proceed
      ansible.builtin.pause:
        prompt: |

          ╔══════════════════════════════════════════════════════════════════╗
          ║                 ⚠️  WARNING: RESTORE OPERATION                   ║
          ╠══════════════════════════════════════════════════════════════════╣
          ║                                                                  ║
          ║  Snapshot: {{ validated_snapshot_name }}
          ║  Timestamp: {{ found_snapshot_timestamp }}
          ║                                                                  ║
          ║  This operation will:                                            ║
          ║    ✗ Restore system files to the snapshot state                  ║
          ║    ✗ Overwrite changes made after the snapshot                   ║
          ║    ✓ NOT affect: /home, /data, Docker volumes                    ║
          ║    ⚠ REQUIRE a system reboot to complete                         ║
          ║                                                                  ║
          ╚══════════════════════════════════════════════════════════════════╝

          Type 'YES' (uppercase) to proceed, or Ctrl+C to abort
      register: restore_confirmation

    - name: Validate confirmation input
      ansible.builtin.fail:
        msg: |
          Restore aborted. You must type 'YES' (uppercase) to confirm.
          You entered: '{{ restore_confirmation.user_input }}'
      when: restore_confirmation.user_input != 'YES'

    - name: Display restore start message
      ansible.builtin.debug:
        msg: |
          ══════════════════════════════════════════════════════════════════
          🔄 RESTORE IN PROGRESS - This may take 10-30 minutes
          ══════════════════════════════════════════════════════════════════

          Restoring snapshot: {{ validated_snapshot_name }}
          Timestamp: {{ found_snapshot_timestamp }}

          Status updates will appear every 30 seconds...
          DO NOT interrupt this process!
          ══════════════════════════════════════════════════════════════════

    - name: Execute Timeshift restore (async with polling)
      ansible.builtin.shell: |
        timeshift --restore --snapshot "{{ found_snapshot_timestamp }}" --yes 2>&1
      args:
        executable: /bin/bash
      async: 3600
      poll: 0
      register: restore_async_job

    - name: Monitor restore progress
      ansible.builtin.async_status:
        jid: "{{ restore_async_job.ansible_job_id }}"
      register: restore_job_result
      until: restore_job_result.finished
      retries: 120
      delay: 30
      ignore_errors: true

    - name: Display restore result
      ansible.builtin.debug:
        msg: |
          Restore process finished.
          Return code: {{ restore_job_result.rc | default('unknown') }}
          {% if restore_job_result.stdout_lines is defined %}
          Output:
          {{ restore_job_result.stdout_lines | join('\n') }}
          {% endif %}
      when: restore_job_result.finished | default(false)

    - name: Fail if restore did not complete successfully
      ansible.builtin.fail:
        msg: |
          Restore process failed or timed out.
          {% if restore_job_result.stderr is defined %}
          Error: {{ restore_job_result.stderr }}
          {% endif %}
      when: >
        not (restore_job_result.finished | default(false)) or
        (restore_job_result.rc | default(1)) != 0

    - name: Notify about required reboot
      ansible.builtin.pause:
        prompt: |

          ╔══════════════════════════════════════════════════════════════════╗
          ║                    ✅ RESTORE COMPLETED                          ║
          ╠══════════════════════════════════════════════════════════════════╣
          ║                                                                  ║
          ║  Snapshot '{{ validated_snapshot_name }}' has been restored.
          ║                                                                  ║
          ║  ⚠️  A REBOOT IS REQUIRED to complete the restore process.       ║
          ║                                                                  ║
          ║  To reboot the server, run:                                      ║
          ║    ssh {{ ansible_user }}@{{ ansible_host }} 'sudo reboot'
          ║                                                                  ║
          ║  Or manually reboot from the server console.                     ║
          ║                                                                  ║
          ╚══════════════════════════════════════════════════════════════════╝

          Press ENTER to acknowledge (server will NOT reboot automatically)

