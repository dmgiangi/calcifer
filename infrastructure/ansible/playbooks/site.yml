---
# Main playbook for Calcifer server setup
#
# This playbook configures the server with all required components.
# Currently installs and configures Timeshift for system snapshots.
#
# Usage: ansible-playbook playbooks/site.yml --ask-become-pass
#
# Prerequisites:
#   1. SSH access configured (test with: ansible-playbook playbooks/test-connection.yml)
#   2. /data partition must be mounted on the target server

- name: Configure Calcifer server
  hosts: all
  become: true

  pre_tasks:
    - name: Display target server information
      ansible.builtin.debug:
        msg: |
          ═══════════════════════════════════════════════════
          Configuring server: {{ inventory_hostname }}
          Target: {{ ansible_user }}@{{ ansible_host }}
          ═══════════════════════════════════════════════════

    - name: Verify backup partition is mounted
      ansible.builtin.command: findmnt --target {{ timeshift_backup_partition }}
      register: backup_partition_check
      changed_when: false
      failed_when: false

    - name: Fail if backup partition is not mounted
      ansible.builtin.fail:
        msg: |
          ERROR: Backup partition '{{ timeshift_backup_partition }}' is not mounted!

          Ensure the /data partition is mounted before running this playbook.
      when: backup_partition_check.rc != 0

    - name: Update apt package cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

  roles:
    - role: timeshift
      tags: [ timeshift, snapshot ]

  post_tasks:
    - name: Display completion summary
      ansible.builtin.debug:
        msg: |
          ╔══════════════════════════════════════════════════════════════════╗
          ║              ✅ SERVER CONFIGURATION COMPLETED                   ║
          ╠══════════════════════════════════════════════════════════════════╣
          ║                                                                  ║
          ║  Timeshift is now configured for system snapshots.               ║
          ║                                                                  ║
          ║  Available commands:                                             ║
          ║                                                                  ║
          ║  • Create snapshot:                                              ║
          ║    ansible-playbook playbooks/snapshot-create.yml \              ║
          ║      -e "snapshot_name='milestone-name'" --ask-become-pass       ║
          ║                                                                  ║
          ║  • List snapshots:                                               ║
          ║    ansible-playbook playbooks/snapshot-list.yml --ask-become-pass║
          ║                                                                  ║
          ║  • Restore snapshot:                                             ║
          ║    ansible-playbook playbooks/snapshot-restore.yml \             ║
          ║      -e "snapshot_name='milestone-name'" --ask-become-pass       ║
          ║                                                                  ║
          ╚══════════════════════════════════════════════════════════════════╝

