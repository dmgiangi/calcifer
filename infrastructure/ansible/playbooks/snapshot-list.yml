---
# List all Timeshift snapshots with timestamp and mnemonic name
#
# Displays a formatted table of all available snapshots showing:
# - Timestamp (used internally by Timeshift)
# - Mnemonic name (the name you provided when creating the snapshot)
#
# Usage: ansible-playbook playbooks/snapshot-list.yml --ask-become-pass

- name: List Timeshift snapshots
  hosts: all
  become: true

  pre_tasks:
    - name: Verify Timeshift is installed
      ansible.builtin.include_role:
        name: timeshift
        tasks_from: check-installed

  tasks:
    - name: Get raw snapshot list from Timeshift
      ansible.builtin.command: timeshift --list
      register: snapshot_list_raw
      changed_when: false

    - name: Debug raw Timeshift output
      ansible.builtin.debug:
        msg: "{{ snapshot_list_raw.stdout_lines }}"
      when: ansible_verbosity > 0

    - name: Parse and display formatted snapshot list
      ansible.builtin.shell: |
        set -o pipefail
        echo ""
        echo "╔══════════════════════════════════════════════════════════════╗"
        echo "║                    TIMESHIFT SNAPSHOTS                       ║"
        echo "╠══════════════════════════════════════════════════════════════╣"
        echo ""
        printf "  %-25s │ %-30s\n" "TIMESTAMP" "NAME"
        printf "  %-25s─┼─%-30s\n" "─────────────────────────" "──────────────────────────────"

        # Parse timeshift --list output - look for lines with snapshot timestamps
        # Snapshot lines have format like: "  0   >  2026-02-04_21-26-24  O  ..."
        # We match lines containing date pattern YYYY-MM-DD_HH-MM-SS
        timeshift --list 2>/dev/null | grep -E "[0-9]{4}-[0-9]{2}-[0-9]{2}_[0-9]{2}-[0-9]{2}-[0-9]{2}" | while read -r line; do
          # Extract timestamp (format: YYYY-MM-DD_HH-MM-SS)
          timestamp=$(echo "$line" | grep -oE "[0-9]{4}-[0-9]{2}-[0-9]{2}_[0-9]{2}-[0-9]{2}-[0-9]{2}")

          if [ -n "$timestamp" ]; then
            info_file="{{ timeshift_snapshots_data_path }}/$timestamp/info.json"

            if [ -f "$info_file" ]; then
              comment=$(grep -o '"comments"[[:space:]]*:[[:space:]]*"[^"]*"' "$info_file" | cut -d'"' -f4)
              [ -z "$comment" ] && comment="(unnamed)"
            else
              comment="(info not found)"
            fi

            printf "  %-25s │ %-30s\n" "$timestamp" "$comment"
          fi
        done

        echo ""
        echo "╠══════════════════════════════════════════════════════════════╣"
        # Count only lines with valid timestamp pattern
        total=$(timeshift --list 2>/dev/null | grep -cE "[0-9]{4}-[0-9]{2}-[0-9]{2}_[0-9]{2}-[0-9]{2}-[0-9]{2}" || echo "0")
        printf "║  Total snapshots: %-3s                    Retention: %-3s      ║\n" "$total" "{{ timeshift_retention }}"
        echo "╚══════════════════════════════════════════════════════════════╝"
      args:
        executable: /bin/bash
      register: formatted_snapshot_list
      changed_when: false

    - name: Display snapshot list
      ansible.builtin.debug:
        msg: "{{ formatted_snapshot_list.stdout_lines }}"

