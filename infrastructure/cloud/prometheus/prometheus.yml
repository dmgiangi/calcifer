# =============================================================================
# Prometheus Configuration - Cloud Environment
# =============================================================================
# Federated metrics from home + local monitoring stack
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'cloud'
    region: 'primary'

# Rule files
rule_files: [ ]

# Scrape configs
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: [ 'localhost:9090' ]
        labels:
          service: 'prometheus'
          env: 'cloud'

  # Grafana (built-in /metrics on :3000)
  - job_name: 'grafana'
    static_configs:
      - targets: [ 'grafana:3000' ]
        labels:
          service: 'grafana'
          env: 'cloud'

  # Loki (built-in /metrics on :3100)
  - job_name: 'loki'
    static_configs:
      - targets: [ 'loki:3100' ]
        labels:
          service: 'loki'
          env: 'cloud'

  # Tempo (built-in /metrics on :3200)
  - job_name: 'tempo'
    static_configs:
      - targets: [ 'tempo:3200' ]
        labels:
          service: 'tempo'
          env: 'cloud'

  # Keycloak (--metrics-enabled=true, management port 9000)
  - job_name: 'keycloak'
    metrics_path: '/metrics'
    static_configs:
      - targets: [ 'keycloak:9000' ]
        labels:
          service: 'keycloak'
          env: 'cloud'

  # Traefik (--metrics.prometheus=true, API port 8080)
  - job_name: 'traefik'
    static_configs:
      - targets: [ 'traefik:8080' ]
        labels:
          service: 'traefik'
          env: 'cloud'

  # Promtail (built-in /metrics on :9080)
  - job_name: 'promtail'
    static_configs:
      - targets: [ 'promtail:9080' ]
        labels:
          service: 'promtail'
          env: 'cloud'

  # Token Validator (custom /metrics on :4182)
  - job_name: 'token-validator'
    static_configs:
      - targets: [ 'token-validator:4182' ]
        labels:
          service: 'token-validator'
          env: 'cloud'

  # =============================================================================
  # Federation from Home Prometheus
  # =============================================================================
  - job_name: 'federate-home'
    honor_labels: true
    metrics_path: '/federate'
    params:
      'match[]':
        - '{job=~".+"}'
    static_configs:
      - targets: [ '192.168.8.180:9090' ]
        labels:
          federated_from: 'home'

