# =============================================================================
# Prometheus Configuration - Cloud Environment
# =============================================================================
# Scraping for services without OTLP support.
# Traefik, Keycloak, token-validator push metrics via OTLP -> Alloy -> remote_write.
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'cloud'
    region: 'primary'

# Rule files
rule_files: [ ]

# Scrape configs - only services that don't support OTLP push
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: [ 'localhost:9090' ]
        labels:
          service: 'prometheus'
          env: 'cloud'

  # Grafana (built-in /metrics on :3000, no OTLP push support)
  - job_name: 'grafana'
    static_configs:
      - targets: [ 'grafana:3000' ]
        labels:
          service: 'grafana'
          env: 'cloud'

  # Loki (built-in /metrics on :3100, no OTLP push support)
  - job_name: 'loki'
    static_configs:
      - targets: [ 'loki:3100' ]
        labels:
          service: 'loki'
          env: 'cloud'

  # Tempo (built-in /metrics on :3200, no OTLP push support)
  - job_name: 'tempo'
    static_configs:
      - targets: [ 'tempo:3200' ]
        labels:
          service: 'tempo'
          env: 'cloud'

  # Alloy (built-in /metrics on :12345)
  - job_name: 'alloy'
    static_configs:
      - targets: [ 'alloy:12345' ]
        labels:
          service: 'alloy'
          env: 'cloud'

  # Keycloak (scrape as fallback - also sends traces via OTLP)
  - job_name: 'keycloak'
    metrics_path: '/metrics'
    static_configs:
      - targets: [ 'keycloak:9000' ]
        labels:
          service: 'keycloak'
          env: 'cloud'

  # =============================================================================
  # Federation from Home Prometheus
  # =============================================================================
  - job_name: 'federate-home'
    honor_labels: true
    metrics_path: '/federate'
    params:
      'match[]':
        - '{job=~".+"}'
    static_configs:
      - targets: [ '192.168.8.180:9090' ]
        labels:
          federated_from: 'home'

