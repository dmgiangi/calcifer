# =============================================================================
# Prometheus Configuration - Cloud Environment
# =============================================================================
# Federated metrics from home + local monitoring stack
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'cloud'
    region: 'primary'

# Rule files
rule_files: [ ]

# Scrape configs
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: [ 'localhost:9090' ]
        labels:
          service: 'prometheus'
          env: 'cloud'

  # Grafana
  - job_name: 'grafana'
    static_configs:
      - targets: [ 'grafana:3000' ]
        labels:
          service: 'grafana'
          env: 'cloud'

  # Loki
  - job_name: 'loki'
    static_configs:
      - targets: [ 'loki:3100' ]
        labels:
          service: 'loki'
          env: 'cloud'

  # Tempo
  - job_name: 'tempo'
    static_configs:
      - targets: [ 'tempo:3200' ]
        labels:
          service: 'tempo'
          env: 'cloud'

  # Keycloak
  - job_name: 'keycloak'
    metrics_path: '/metrics'
    static_configs:
      - targets: [ 'keycloak:8080' ]
        labels:
          service: 'keycloak'
          env: 'cloud'

  # Traefik
  - job_name: 'traefik'
    static_configs:
      - targets: [ 'traefik:8080' ]
        labels:
          service: 'traefik'
          env: 'cloud'

  # =============================================================================
  # Federation from Home Prometheus
  # =============================================================================
  - job_name: 'federate-home'
    honor_labels: true
    metrics_path: '/federate'
    params:
      'match[]':
        - '{job=~".+"}'
    static_configs:
      - targets: [ '${HOME_PROMETHEUS_HOST:-192.168.8.180}:9090' ]
        labels:
          federated_from: 'home'

