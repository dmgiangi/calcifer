# =============================================================================
# Traefik Dynamic Configuration - Middlewares
# =============================================================================

http:
  middlewares:
    # ==================== FORWARD AUTH ====================
    # Browser-based OAuth authentication via Keycloak
    forward-auth:
      forwardAuth:
        address: "http://forward-auth:4181"
        trustForwardHeader: true
        maxResponseBodySize: 1048576  # 1MB
        authResponseHeaders:
          - "X-Forwarded-User"
          - "X-Forwarded-Email"
          - "X-Forwarded-Groups"

    # ==================== TOKEN AUTH ====================
    # API access via Bearer token (M2M / client credentials)
    token-auth:
      forwardAuth:
        address: "http://token-validator:4182"
        trustForwardHeader: true
        maxResponseBodySize: 1048576  # 1MB
        authResponseHeaders:
          - "X-Forwarded-User"

    # ==================== HEADERS ====================
    secure-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        frameDeny: true
        sslRedirect: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customFrameOptionsValue: "SAMEORIGIN"

    # ==================== RATE LIMITING ====================
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1s

    # ==================== CORS ====================
    cors:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - "*"
        accessControlAllowOriginListRegex:
          - "https://.*\\.dmgiangi\\.dev"
        accessControlMaxAge: 100
        addVaryHeader: true

