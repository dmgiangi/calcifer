# =============================================================================
# Traefik Dynamic Configuration - Routes
# =============================================================================
# Note: Most routes are now defined via Docker labels in docker-compose.yaml
# This file contains additional routes for services without labels
# =============================================================================

http:
  routers:
    # ==================== LOKI (Internal service) ====================
    loki:
      rule: "Host(`loki.dmgiangi.dev`)"
      service: loki
      middlewares:
        - forward-auth
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

    # ==================== TEMPO (Internal service) ====================
    tempo:
      rule: "Host(`tempo.dmgiangi.dev`)"
      service: tempo
      middlewares:
        - forward-auth
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

  services:
    loki:
      loadBalancer:
        servers:
          - url: "http://calcifer-cloud_loki:3100"

    tempo:
      loadBalancer:
        servers:
          - url: "http://calcifer-cloud_tempo:3200"

