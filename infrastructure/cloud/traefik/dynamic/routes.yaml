# =============================================================================
# Traefik Dynamic Configuration - Routes
# =============================================================================
# Routes for services with two authentication methods:
# 1. Browser (OAuth via forward-auth) - lower priority
# 2. API (Bearer token via token-auth) - higher priority
# =============================================================================

http:
  routers:
    # ==================== API ROUTES (Bearer token auth) ====================
    # Higher priority (100) - checked first
    # Uses HeaderRegexp (not HeadersRegexp) for Traefik v3

    grafana-api:
      rule: "Host(`grafana.dmgiangi.dev`) && HeaderRegexp(`Authorization`, `^Bearer .+`)"
      service: grafana
      middlewares:
        - token-auth
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      priority: 100

    prometheus-api:
      rule: "Host(`prometheus.dmgiangi.dev`) && HeaderRegexp(`Authorization`, `^Bearer .+`)"
      service: prometheus
      middlewares:
        - token-auth
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      priority: 100

    loki-api:
      rule: "Host(`loki.dmgiangi.dev`) && HeaderRegexp(`Authorization`, `^Bearer .+`)"
      service: loki
      middlewares:
        - token-auth
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      priority: 100

    tempo-api:
      rule: "Host(`tempo.dmgiangi.dev`) && HeaderRegexp(`Authorization`, `^Bearer .+`)"
      service: tempo
      middlewares:
        - token-auth
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      priority: 100

    traefik-api:
      rule: "Host(`traefik.dmgiangi.dev`) && HeaderRegexp(`Authorization`, `^Bearer .+`)"
      service: api@internal
      middlewares:
        - token-auth
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      priority: 100

    homepage-api:
      rule: "Host(`home.dmgiangi.dev`) && HeaderRegexp(`Authorization`, `^Bearer .+`)"
      service: homepage
      middlewares:
        - token-auth
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      priority: 100

    # ==================== BROWSER ROUTES (OAuth auth) ====================
    # Lower priority (default 0) - fallback when no Bearer token

    loki:
      rule: "Host(`loki.dmgiangi.dev`)"
      service: loki
      middlewares:
        - forward-auth
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

    tempo:
      rule: "Host(`tempo.dmgiangi.dev`)"
      service: tempo
      middlewares:
        - forward-auth
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

  services:
    loki:
      loadBalancer:
        servers:
          - url: "http://loki:3100"

    tempo:
      loadBalancer:
        servers:
          - url: "http://tempo:3200"

    grafana:
      loadBalancer:
        servers:
          - url: "http://grafana:3000"

    prometheus:
      loadBalancer:
        servers:
          - url: "http://prometheus:9090"

    homepage:
      loadBalancer:
        servers:
          - url: "http://homepage:3000"

