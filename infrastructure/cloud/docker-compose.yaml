# =============================================================================
# Calcifer Cloud - Public Infrastructure
# =============================================================================
# Components: Monitoring (federated) + Keycloak + Traefik
# Usage: docker compose up -d
# =============================================================================

include:
  - ../common/docker-compose.monitoring.yaml

services:
  # ==================== METRICS ====================
  prometheus:
    image: prom/prometheus:v3
    container_name: calcifer_cloud_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${DATA_DIR:-/var/lib/calcifer/cloud}/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
      - '--enable-feature=exemplar-storage'
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--output-document=-", "http://localhost:9090/-/healthy" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - calcifer_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN:-dmgiangi.dev}`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls.certresolver=letsencrypt"
      - "traefik.http.routers.prometheus.middlewares=forward-auth@file"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
      # Homepage
      - "homepage.group=Monitoring"
      - "homepage.name=Prometheus"
      - "homepage.icon=prometheus.png"
      - "homepage.href=https://prometheus.${DOMAIN:-dmgiangi.dev}"
      - "homepage.description=Metrics & Alerting"
      - "homepage.siteMonitor=http://calcifer_cloud_prometheus:9090/-/healthy"

  # ==================== VISUALIZATION ====================
  grafana:
    image: grafana/grafana:main
    container_name: calcifer_cloud_grafana
    restart: unless-stopped
    env_file:
      - ../common/grafana/grafana.env
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=https://grafana.${DOMAIN:-dmgiangi.dev}
      # Auth proxy for Traefik/Keycloak
      - GF_AUTH_PROXY_ENABLED=true
      - GF_AUTH_PROXY_HEADER_NAME=X-Forwarded-User
      - GF_AUTH_PROXY_HEADER_PROPERTY=username
      - GF_AUTH_PROXY_AUTO_SIGN_UP=true
    volumes:
      - ../common/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${DATA_DIR:-/var/lib/calcifer/cloud}/grafana:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--output-document=-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - calcifer_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN:-dmgiangi.dev}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.routers.grafana.middlewares=forward-auth@file"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      # Homepage
      - "homepage.group=Monitoring"
      - "homepage.name=Grafana"
      - "homepage.icon=grafana.png"
      - "homepage.href=https://grafana.${DOMAIN:-dmgiangi.dev}"
      - "homepage.description=Dashboards & Visualization"
      - "homepage.siteMonitor=http://calcifer_cloud_grafana:3000/api/health"

  # ==================== IDENTITY PROVIDER ====================
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: calcifer_cloud_keycloak
    restart: unless-stopped
    entrypoint: /opt/keycloak/custom-entrypoint.sh
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN:-admin}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # Env vars substituted into realm template by entrypoint
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-calcifer-gateway}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-}
      - API_CLIENT_ID=${API_CLIENT_ID:-calcifer-api}
      - API_CLIENT_SECRET=${API_CLIENT_SECRET:-}
    command:
      - --hostname=https://keycloak.${DOMAIN:-dmgiangi.dev}
      - --hostname-backchannel-dynamic=true
      - --http-enabled=true
      - --health-enabled=true
      - --proxy-headers=xforwarded
    volumes:
      - ./keycloak/docker-entrypoint.sh:/opt/keycloak/custom-entrypoint.sh:ro
      - ./keycloak/calcifer-realm.json:/opt/keycloak/data/import-templates/calcifer-realm.json:ro
      - ${DATA_DIR:-/var/lib/calcifer/cloud}/keycloak:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - calcifer_net
    labels:
      - "traefik.enable=true"
      # Keycloak does NOT use forward-auth (it IS the auth provider)
      - "traefik.http.routers.keycloak.rule=Host(`keycloak.${DOMAIN:-dmgiangi.dev}`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls.certresolver=letsencrypt"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
      # Homepage
      - "homepage.group=Identity"
      - "homepage.name=Keycloak"
      - "homepage.icon=keycloak.png"
      - "homepage.href=https://keycloak.${DOMAIN:-dmgiangi.dev}"
      - "homepage.description=Identity & Access Management"
      - "homepage.siteMonitor=http://calcifer_cloud_keycloak:9000/health/ready"


  # Adds Google IDP to master realm (one-shot, idempotent)
  keycloak-master-idp:
    image: alpine:3.19
    container_name: calcifer_cloud_keycloak_master_idp
    restart: "no"
    entrypoint: /bin/sh
    command: ["/init.sh"]
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      - KEYCLOAK_URL=http://keycloak:8080
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN:-admin}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
    volumes:
      - ./keycloak/master-idp-init.sh:/init.sh:ro
    networks:
      - calcifer_net

  # ==================== EDGE ROUTER ====================
  traefik:
    image: traefik:v3.6
    container_name: calcifer_cloud_traefik
    restart: unless-stopped
    command:
      # API & Dashboard
      - "--api.dashboard=true"
      - "--api.insecure=false"
      # Providers
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      # Let's Encrypt ACME
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@dmgiangi.dev}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      # Health
      - "--ping=true"
      # Logging
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ${DATA_DIR:-/var/lib/calcifer/cloud}/traefik/certs:/letsencrypt
    networks:
      - calcifer_net
    labels:
      - "traefik.enable=true"
      # Dashboard on traefik.dmgiangi.dev
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN:-dmgiangi.dev}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=forward-auth@file"
      # Homepage
      - "homepage.group=Infrastructure"
      - "homepage.name=Traefik"
      - "homepage.icon=traefik.png"
      - "homepage.href=https://traefik.${DOMAIN:-dmgiangi.dev}"
      - "homepage.description=Edge Router & Load Balancer"
      - "homepage.siteMonitor=http://calcifer_cloud_traefik:8080/ping"

  # ==================== FORWARD AUTH ====================
  forward-auth:
    image: thomseddon/traefik-forward-auth:2
    container_name: calcifer_cloud_forward_auth
    restart: unless-stopped
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      - DEFAULT_PROVIDER=oidc
      # Use public URL - issuer must match what Keycloak returns
      - PROVIDERS_OIDC_ISSUER_URL=https://keycloak.${DOMAIN:-dmgiangi.dev}/realms/calcifer
      - PROVIDERS_OIDC_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-calcifer-gateway}
      - PROVIDERS_OIDC_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-change-me-in-production}
      - SECRET=${FORWARD_AUTH_SECRET:-a-random-secret-change-me}
      - AUTH_HOST=auth.${DOMAIN:-dmgiangi.dev}
      - COOKIE_DOMAIN=${DOMAIN:-dmgiangi.dev}
      - INSECURE_COOKIE=false
      - LOG_LEVEL=debug
      - URL_PATH=/_oauth
    networks:
      - calcifer_net
    # Add host entry to resolve keycloak.dmgiangi.dev to traefik inside Docker network
    extra_hosts:
      - "keycloak.${DOMAIN:-dmgiangi.dev}:host-gateway"
    labels:
      - "traefik.enable=true"
      # OAuth callback route - auth.dmgiangi.dev MUST use forward-auth middleware
      # This allows forward-auth to receive callbacks via X-Forwarded-Uri header
      - "traefik.http.routers.forward-auth.rule=Host(`auth.${DOMAIN:-dmgiangi.dev}`)"
      - "traefik.http.routers.forward-auth.entrypoints=websecure"
      - "traefik.http.routers.forward-auth.tls.certresolver=letsencrypt"
      - "traefik.http.routers.forward-auth.middlewares=forward-auth@file"
      - "traefik.http.services.forward-auth.loadbalancer.server.port=4181"

  # ==================== TOKEN VALIDATOR ====================
  # Validates JWT Bearer tokens for API access (M2M)
  token-validator:
    build: ./token-validator
    container_name: calcifer_cloud_token_validator
    restart: unless-stopped
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      - KEYCLOAK_URL=http://keycloak:8080
      - REALM=calcifer
      - CLIENT_ID=${API_CLIENT_ID:-calcifer-api}
      - CLIENT_SECRET=${API_CLIENT_SECRET:-}
      - PORT=4182
    networks:
      - calcifer_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.token-validator.loadbalancer.server.port=4182"

  # ==================== HOMEPAGE DASHBOARD ====================
  # ==================== LOKI ====================
  loki:
    image: grafana/loki:2.9.3
    container_name: calcifer_cloud_loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - ${DATA_DIR:-/var/lib/calcifer/cloud}/loki:/loki
    networks:
      - calcifer_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      # API route (for programmatic access with Bearer token)
      - "traefik.http.routers.loki.rule=Host(`loki.${DOMAIN:-dmgiangi.dev}`)"
      - "traefik.http.routers.loki.entrypoints=websecure"
      - "traefik.http.routers.loki.tls.certresolver=letsencrypt"
      - "traefik.http.routers.loki.middlewares=forward-auth@file"
      - "traefik.http.services.loki.loadbalancer.server.port=3100"
      # No homepage entry - Loki is API-only, accessed via Grafana Explore

  # ==================== TEMPO ====================
  tempo:
    image: grafana/tempo:2.3.1
    container_name: calcifer_cloud_tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - ${DATA_DIR:-/var/lib/calcifer/cloud}/tempo:/var/tempo
    networks:
      - calcifer_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      # API route (for programmatic access with Bearer token)
      - "traefik.http.routers.tempo.rule=Host(`tempo.${DOMAIN:-dmgiangi.dev}`)"
      - "traefik.http.routers.tempo.entrypoints=websecure"
      - "traefik.http.routers.tempo.tls.certresolver=letsencrypt"
      - "traefik.http.routers.tempo.middlewares=forward-auth@file"
      - "traefik.http.services.tempo.loadbalancer.server.port=3200"
      # No homepage entry - Tempo is API-only, accessed via Grafana Explore

  # ==================== HOMEPAGE ====================
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: calcifer_cloud_homepage
    restart: unless-stopped
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=home.dmgiangi.dev
    volumes:
      - ./homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - calcifer_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.rule=Host(`home.${DOMAIN:-dmgiangi.dev}`)"
      - "traefik.http.routers.homepage.entrypoints=websecure"
      - "traefik.http.routers.homepage.tls.certresolver=letsencrypt"
      - "traefik.http.routers.homepage.middlewares=forward-auth@file"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"
      # Homepage self-reference
      - "homepage.group=Infrastructure"
      - "homepage.name=Homepage"
      - "homepage.icon=homepage.png"
      - "homepage.href=https://home.${DOMAIN:-dmgiangi.dev}"
      - "homepage.description=Dashboard"
      - "homepage.siteMonitor=http://calcifer_cloud_homepage:3000"

networks:
  calcifer_net:
    driver: bridge

